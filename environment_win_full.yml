  - conda-forge
  - nvidia
  - nodefaults
dependencies:
  - python=3.12
  - numpy
  - matplotlib
  - scipy
  - fftw
  - cmake>=3.28
  - ninja
  - setuptools
  - scikit-build-core
  - intel-openmp
  - cupy
