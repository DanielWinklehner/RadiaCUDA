  - gmsh>=4.15
  - python-gmsh
  - yaml
  - pyyaml
  - mpi4py
  - sympy
  - tqdm
  - impi-devel
  - h5py
  - cython
  - intel-opencl-rt
  - meshio
  - numba
  - occt
  - pyopencl
  - pythonocc-core
